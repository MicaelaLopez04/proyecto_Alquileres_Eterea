<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva</title>
      <link rel="stylesheet" href="css/reservaStyle.css">
      <link rel="stylesheet" href="css/navbar.css">
</head>
<body>
     <nav class="navbar">
    <div class="logo"> Alquileres Eterea</div>

    <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="informacion.html">Info</a></li>
        <li><a href="">Servicios</a></li>
        <li><a href="contacto.html">Contacto</a></li>
    </ul>
</nav>

   <form id="formReserva">
    
    <div class="form-group">
        <label for="fechaInicio">Fecha de inicio</label>
        <input type="date" id="fechaInicio" required>
    </div>

    <div class="form-group">
        <label for="fechaFin">Fecha de fin</label>
        <input type="date" id="fechaFin" required>
    </div>

    <div class="form-group">
        <label for="cantidadPersonas">Cantidad de personas</label>
        <input type="number" id="cantidadPersonas" min="1" required>
    </div>

    <div class="form-group">
        <label for="descripcion">Descripción</label>
        <input type="text" id="descripcion" placeholder="Opcional">
    </div>

    <div class="form-group">
        <label for="usuarioId">Usuario ID</label>
        <input type="number" id="usuarioId" required>
    </div>

</form>

    <button onclick="crearReserva(event)">Reservar</button>
<script src="js/reserva.js"></script>
</body>
</html>
